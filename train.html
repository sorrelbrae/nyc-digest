<style>
  :root {
    --bg: #0d0d0f;
    --surface: #141418;
    --surface2: #1c1c22;
    --border: #2a2a35;
    --accent: #c8f060;
    --accent2: #60d4f0;
    --accent3: #f060c8;
    --text: #e8e8f0;
    --text-dim: #8888a0;
    --text-dimmer: #555566;
    --tag-bg: #1e1e2a;
    --up-color: #60f090;
    --maybe-color: #f0d060;
    --down-color: #f06060;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    line-height: 1.6;
    max-width: 820px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }
  .header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 24px;
    margin-bottom: 24px;
  }
  .header-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  h1 { font-size: 26px; font-weight: 700; line-height: 1.2; margin-bottom: 6px; }
  .header-sub { color: var(--text-dim); font-size: 14px; }

  /* Stats bar */
  .stats-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }
  .stat {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
  }
  .stat-count { font-weight: 700; font-size: 16px; }
  .stat-up .stat-count { color: var(--up-color); }
  .stat-maybe .stat-count { color: var(--maybe-color); }
  .stat-down .stat-count { color: var(--down-color); }
  .stat-label { color: var(--text-dimmer); }
  .progress-bar-wrap {
    flex: 1;
    min-width: 120px;
    background: var(--border);
    height: 4px;
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar { height: 4px; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
  .progress-pct { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--text-dimmer); white-space: nowrap; }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: #3a3a4a; color: var(--text); }
  .filter-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 700; }

  /* Day sections */
  .day-section { margin-bottom: 36px; }
  .day-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .day-name { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
  .day-date { font-size: 12px; color: var(--text-dimmer); }
  .day-count { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text-dimmer); margin-left: auto; }

  /* Event cards */
  .event-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    margin-bottom: 10px;
    transition: border-color 0.15s, opacity 0.2s;
  }
  .event-card.wildcard { border-left: 3px solid var(--accent3); }
  .event-card.rated-up { border-color: var(--up-color); background: rgba(96,240,144,0.05); }
  .event-card.rated-maybe { border-color: var(--maybe-color); background: rgba(240,208,96,0.05); }
  .event-card.rated-down { border-color: var(--down-color); background: rgba(240,96,96,0.05); opacity: 0.6; }
  .event-card.hidden { display: none; }

  .event-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 4px;
  }
  .event-title { font-size: 15px; font-weight: 600; line-height: 1.3; flex: 1; }
  .event-title a { color: var(--text); text-decoration: none; }
  .event-title a:hover { color: var(--accent2); }
  .wildcard-badge {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--accent3);
    background: rgba(240,96,200,0.1);
    padding: 2px 7px;
    border-radius: 3px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .event-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .event-venue { font-size: 12px; color: var(--accent2); font-weight: 500; }
  .event-time { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text-dimmer); }
  .event-price { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--accent); }
  .event-dot { color: var(--text-dimmer); font-size: 9px; }
  .event-desc { font-size: 13px; color: var(--text-dim); line-height: 1.5; margin-bottom: 10px; }

  .event-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
  .tag {
    background: var(--tag-bg);
    color: var(--text-dimmer);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 1px 7px;
    border-radius: 3px;
    text-transform: lowercase;
  }
  .tag.science { color: #60f0a0; background: rgba(96,240,160,0.1); }
  .tag.film { color: #f0a060; background: rgba(240,160,96,0.1); }
  .tag.music { color: #a060f0; background: rgba(160,96,240,0.1); }
  .tag.comedy { color: #f0d060; background: rgba(240,208,96,0.1); }
  .tag.theater { color: #f06090; background: rgba(240,96,144,0.1); }
  .tag.talk { color: #60d4f0; background: rgba(96,212,240,0.1); }
  .tag.free { color: var(--accent); background: rgba(200,240,96,0.1); }

  /* Rating buttons */
  .rating-btns { display: flex; gap: 8px; }
  .rating-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 13px;
    padding: 6px 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 500;
  }
  .rating-btn:hover { border-color: #3a3a4a; }
  .rating-btn.up { color: var(--up-color); }
  .rating-btn.maybe { color: var(--maybe-color); }
  .rating-btn.down { color: var(--down-color); }
  .rating-btn.selected-up { background: rgba(96,240,144,0.15); border-color: var(--up-color); color: var(--up-color); }
  .rating-btn.selected-maybe { background: rgba(240,208,96,0.15); border-color: var(--maybe-color); color: var(--maybe-color); }
  .rating-btn.selected-down { background: rgba(240,96,96,0.15); border-color: var(--down-color); color: var(--down-color); }

  /* Save button */
  .save-area { margin-top: 32px; text-align: center; }
  .save-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    padding: 14px 36px;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: opacity 0.15s;
  }
  .save-btn:hover { opacity: 0.85; }
  .save-btn:disabled { opacity: 0.4; cursor: default; }
  .save-status {
    margin-top: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text-dimmer);
    min-height: 20px;
  }
  .save-status.success { color: var(--up-color); }
  .save-status.error { color: var(--down-color); }

  .back-link {
    display: inline-block;
    margin-bottom: 24px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--accent2);
    text-decoration: none;
  }
  .back-link:hover { text-decoration: underline; }
</style>
</head>

// Load existing ratings if available
var savedRatings = {};
try {
  var saved = localStorage.getItem('nyc-concierge-ratings-apr-2026');
  if (saved) savedRatings = JSON.parse(saved);
} catch(e) {}
ratings = savedRatings;

function renderEvents() {
  var container = document.getElementById('events-container');
  container.innerHTML = '';

  // Group by day
  var days = {};
  EVENTS.forEach(function(ev) {
    var key = ev.dayLabel;
    if (!days[key]) days[key] = [];
    days[key].push(ev);
  });

  Object.keys(days).forEach(function(dayLabel) {
    var section = document.createElement('div');
    section.className = 'day-section';
    section.setAttribute('data-day', dayLabel);

    var header = document.createElement('div');
    header.className = 'day-header';
    var parts = dayLabel.split(' ');
    header.innerHTML = '<span class="day-name">' + parts[0] + '</span><span class="day-date">' + parts.slice(1).join(' ') + '</span><span class="day-count" id="count-' + dayLabel.replace(/\s/g,'_') + '">' + days[dayLabel].length + ' events</span>';
    section.appendChild(header);

    days[dayLabel].forEach(function(ev) {
      var card = createCard(ev);
      section.appendChild(card);
    });

    container.appendChild(section);
  });
  updateStats();
  applyFilter(currentFilter);
}

function createCard(ev) {
  var card = document.createElement('div');
  card.className = 'event-card' + (ev.isWildcard ? ' wildcard' : '');
  card.id = 'card-' + ev.id;
  if (ratings[ev.id]) card.classList.add('rated-' + ratings[ev.id]);

  var tagHtml = ev.tags.map(function(t) {
    var cls = 'tag';
    if (['science','marine biology','ecology','math/physics'].some(function(x){return t.includes(x)||x.includes(t)})) cls += ' science';
    else if (['film','repertory','documentary','cinema','35mm','arthouse'].some(function(x){return t.includes(x)||x.includes(t)})) cls += ' film';
    else if (['music','improvisation','jazz','classical','folk','experimental','noise'].some(function(x){return t.includes(x)||x.includes(t)})) cls += ' music';
    else if (['comedy','trivia','standup','slapstick','PowerPoint','game show'].some(function(x){return t.includes(x)||x.includes(t)})) cls += ' comedy';
    else if (['theater','performance'].some(function(x){return t.includes(x)||x.includes(t)})) cls += ' theater';
    else if (['talk','lecture','book launch','reading','museum'].some(function(x){return t.includes(x)||x.includes(t)})) cls += ' talk';
    if (t === 'free') cls += ' free';
    return '<span class="' + cls + '">' + t + '</span>';
  }).join('');

  var currentRating = ratings[ev.id] || '';
  card.innerHTML = '<div class="event-top"><div class="event-title"><a href="' + ev.url + '" target="_blank">' + ev.title + '</a></div>' + (ev.isWildcard ? '<span class="wildcard-badge">🃏 wildcard</span>' : '') + '</div><div class="event-meta"><span class="event-venue">' + ev.venue + '</span><span class="event-dot">·</span><span class="event-time">' + ev.time + '</span><span class="event-dot">·</span><span class="event-price">' + ev.price + '</span></div><p class="event-desc">' + ev.description + '</p><div class="event-tags">' + tagHtml + '</div><div class="rating-btns"><button class="rating-btn up' + (currentRating === 'up' ? ' selected-up' : '') + '" onclick="rate(\'' + ev.id + '\', \'up\', this)">👍 Interested</button><button class="rating-btn maybe' + (currentRating === 'maybe' ? ' selected-maybe' : '') + '" onclick="rate(\'' + ev.id + '\', \'maybe\', this)">🤔 Maybe</button><button class="rating-btn down' + (currentRating === 'down' ? ' selected-down' : '') + '" onclick="rate(\'' + ev.id + '\', \'down\', this)">👎 Not for me</button></div>';
  return card;
}

function rate(id, reaction, btn) {
  var prev = ratings[id];
  if (prev === reaction) {
    delete ratings[id];
    reaction = null;
  } else {
    ratings[id] = reaction;
  }

  var card = document.getElementById('card-' + id);
  card.classList.remove('rated-up', 'rated-maybe', 'rated-down');
  if (reaction) card.classList.add('rated-' + reaction);

  // Update buttons
  var btns = card.querySelectorAll('.rating-btn');
  btns.forEach(function(b) {
    b.classList.remove('selected-up', 'selected-maybe', 'selected-down');
  });
  if (reaction) {
    btns.forEach(function(b) {
      if ((reaction === 'up' && b.classList.contains('up')) ||
          (reaction === 'maybe' && b.classList.contains('maybe')) ||
          (reaction === 'down' && b.classList.contains('down'))) {
        b.classList.add('selected-' + reaction);
      }
    });
  }

  try { localStorage.setItem('nyc-concierge-ratings-apr-2026', JSON.stringify(ratings)); } catch(e) {}
  updateStats();
  if (currentFilter !== 'all') applyFilter(currentFilter);
}

function updateStats() {
  var up = 0, maybe = 0, down = 0;
  Object.values(ratings).forEach(function(r) {
    if (r === 'up') up++;
    else if (r === 'maybe') maybe++;
    else if (r === 'down') down++;
  });
  var total = up + maybe + down;
  document.getElementById('count-up').textContent = up;
  document.getElementById('count-maybe').textContent = maybe;
  document.getElementById('count-down').textContent = down;
  document.getElementById('progress-pct').textContent = total + ' / ' + EVENTS.length;
  document.getElementById('progress-bar').style.width = Math.round(total / EVENTS.length * 100) + '%';
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-filter') === f);
  });
  applyFilter(f);
}

function applyFilter(f) {
  EVENTS.forEach(function(ev) {
    var card = document.getElementById('card-' + ev.id);
    if (!card) return;
    var r = ratings[ev.id];
    var show = f === 'all' ||
               (f === 'unrated' && !r) ||
               (f === 'up' && r === 'up') ||
               (f === 'maybe' && r === 'maybe') ||
               (f === 'down' && r === 'down');
    card.classList.toggle('hidden', !show);
  });

  // Hide/show day sections if all hidden
  document.querySelectorAll('.day-section').forEach(function(sec) {
    var visible = Array.from(sec.querySelectorAll('.event-card')).some(function(c) {
      return !c.classList.contains('hidden');
    });
    sec.style.display = visible ? '' : 'none';
  });
}

async function saveFeedback() {
  var btn = document.getElementById('save-btn');
  var status = document.getElementById('save-status');
  btn.disabled = true;
  status.className = 'save-status';
  status.textContent = 'Saving…';

  var today = new Date().toISOString().split('T')[0];

  var newEntries = EVENTS.filter(function(ev) {
    return ratings[ev.id];
  }).map(function(ev) {
    return {
      date: today,
      eventId: ev.id,
      eventTitle: ev.title,
      eventVenue: ev.venue,
      eventDate: ev.date,
      reaction: ratings[ev.id],
      tags: ev.tags,
      source: ev.source,
      isWildcard: ev.isWildcard,
      priceCents: ev.priceCents
    };
  });

  if (newEntries.length === 0) {
    status.textContent = 'No ratings to save yet. Rate some events first!';
    btn.disabled = false;
    return;
  }

  try {
    var headers = {
      'Authorization': 'token ' + GITHUB_TOKEN,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    };

    // Get current file
    var getResp = await fetch('https://api.github.com/repos/' + REPO + '/contents/' + FEEDBACK_FILE, { headers });
    var sha = null;
    var existing = [];
    if (getResp.ok) {
      var current = await getResp.json();
      sha = current.sha;
      try { existing = JSON.parse(atob(current.content.replace(/\n/g,''))); } catch(e) {}
    }

    // Merge: remove old entries from this week, add new
    var thisWeekIds = EVENTS.map(function(ev) { return ev.id; });
    var merged = existing.filter(function(e) { return !thisWeekIds.includes(e.eventId); }).concat(newEntries);

    var content = btoa(unescape(encodeURIComponent(JSON.stringify(merged, null, 2))));
    var body = { message: 'Update feedback for Apr 2-8, 2026', content: content };
    if (sha) body.sha = sha;

    var putResp = await fetch('https://api.github.com/repos/' + REPO + '/contents/' + FEEDBACK_FILE, {
      method: 'PUT', headers, body: JSON.stringify(body)
    });

    if (putResp.ok) {
      status.className = 'save-status success';
      status.textContent = '✓ Saved ' + newEntries.length + ' ratings to GitHub!';
    } else {
      var err = await putResp.json();
      throw new Error(err.message || putResp.status);
    }
  } catch(e) {
    status.className = 'save-status error';
    status.textContent = 'Error: ' + e.message;
  }

  btn.disabled = false;
}

// Init
renderEvents();
</script>
