function loadExistingFeedback() {
  fetch('https://api.github.com/repos/' + GITHUB_REPO + '/contents/' + FEEDBACK_PATH, {
    headers: { 'Authorization': 'Bearer ' + GITHUB_TOKEN }
  })
  .then(function(r) { return r.ok ? r.json() : null; })
  .then(function(data) {
    if (data && data.content) {
      try {
        existingFeedback = JSON.parse(atob(data.content.replace(/\n/g, '')));
        window._feedbackSha = data.sha;
      } catch(e) { existingFeedback = []; }
    }
  })
  .catch(function() { /* no existing feedback */ });

function renderEvents() {

    if (currentFilter === 'all') return true;
    if (currentFilter === 'unrated') return !reactions[ev.id];
    return reactions[ev.id] === currentFilter;
  });

    list.innerHTML = '<div class="empty-state"><div class="icon">&#128064;</div><p>No events match this filter.<br>Try a different view.</p></div>';
    return;
  }

  filtered.sort(function(a, b) {
    var aRated = reactions[a.id] ? 1 : 0;
    var bRated = reactions[b.id] ? 1 : 0;
    if (aRated !== bRated) return aRated - bRated;
    return a.date.localeCompare(b.date);
  });

  list.innerHTML = filtered.map(function(ev) {
    var r = reactions[ev.id] || '';
    var cardClass = r ? 'event-card rated-' + r : 'event-card';
    var tagsHtml = ev.tags.map(function(t) {
      var cls = 'tag tag-category';
      if (t === 'free') cls = 'tag tag-free';
      else if (ev.priceCents > 0 && ev.priceCents <= 2500 && t === ev.tags[0]) cls = 'tag tag-cheap';
      return '<span class="' + cls + '">' + t + '</span>';
    }).join('');

    if (ev.source === 'newsletter') tagsHtml += '<span class="tag tag-newsletter">newsletter</span>';
    if (ev.isWildcard) tagsHtml += '<span class="tag tag-wildcard">wildcard</span>';

    return '<div class="' + cardClass + '" id="card-' + ev.id + '">' +
      '<div class="event-date">' + ev.dayLabel + ' \u00b7 ' + ev.time + '</div>' +
      '<div class="event-title"><a href="' + ev.url + '" target="_blank">' + ev.title + '</a></div>' +
      '<div class="event-meta">' + ev.venue + ' \u00b7 ' + ev.address + ' \u00b7 ' + ev.price + '</div>' +
      '<div class="event-desc">' + ev.description + '</div>' +
      '<div class="event-tags">' + tagsHtml + '</div>' +
      '<div class="reaction-buttons">' +
        '<button class="react-btn' + (r === 'up' ? ' selected-up' : '') + '" onclick="react(\'' + ev.id + '\',\'up\')"><span class="emoji">&#128077;</span> Interested</button>' +
        '<button class="react-btn' + (r === 'maybe' ? ' selected-maybe' : '') + '" onclick="react(\'' + ev.id + '\',\'maybe\')"><span class="emoji">&#129300;</span> Maybe</button>' +
        '<button class="react-btn' + (r === 'down' ? ' selected-down' : '') + '" onclick="react(\'' + ev.id + '\',\'down\')"><span class="emoji">&#128078;</span> Not for me</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

// ============================================================
// REACTIONS
// ============================================================
function react(eventId, type) {
  if (reactions[eventId] === type) {
    delete reactions[eventId];
  } else {
    reactions[eventId] = type;
  }
  renderEvents();
  updateStats();
}

// ============================================================
// STATS
// ============================================================
function updateStats() {
  var up = 0, down = 0, maybe = 0, unseen = 0;
  EVENTS.forEach(function(ev) {
    var r = reactions[ev.id];
    if (r === 'up') up++;
    else if (r === 'down') down++;
    else if (r === 'maybe') maybe++;
    else unseen++;
  });
  document.getElementById('count-up').textContent = up;
  document.getElementById('count-down').textContent = down;
  document.getElementById('count-maybe').textContent = maybe;
  document.getElementById('count-unseen').textContent = unseen;

  var total = EVENTS.length;
  var rated = up + down + maybe;
  var pct = total > 0 ? Math.round(rated / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = pct + '% rated';

  var btn = document.getElementById('save-btn');
  var countEl = document.getElementById('save-count');
  if (rated > 0) {
    btn.disabled = false;
    countEl.textContent = '(' + rated + ' rated)';
  } else {
    btn.disabled = true;
    countEl.textContent = '(rate some events first)';
  }
}

// ============================================================
// FILTERS
// ============================================================
function setupFilters() {
  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      currentFilter = btn.getAttribute('data-filter');
      renderEvents();
    });
  });
}

// ============================================================
// SAVE FEEDBACK TO GITHUB
// ============================================================
function saveFeedback() {
  var btn = document.getElementById('save-btn');
  btn.textContent = 'Saving...';
  btn.disabled = true;

  var sessionFeedback = [];
  var today = new Date().toISOString().split('T')[0];

  EVENTS.forEach(function(ev) {
    var r = reactions[ev.id];
    if (!r) return;
    sessionFeedback.push({
      date: today,
      eventId: ev.id,
      eventTitle: ev.title,
      eventVenue: ev.venue,
      eventDate: ev.date,
      reaction: r,
      tags: ev.tags,
      source: ev.source,
      isWildcard: ev.isWildcard,
      priceCents: ev.priceCents
    });
  });

  var allFeedback = existingFeedback.concat(sessionFeedback);
  var content = btoa(unescape(encodeURIComponent(JSON.stringify(allFeedback, null, 2))));

  var body = {
    message: 'Update taste feedback ' + today,
    content: content
  };
  if (window._feedbackSha) {
    body.sha = window._feedbackSha;
  }

  fetch('https://api.github.com/repos/' + GITHUB_REPO + '/contents/' + FEEDBACK_PATH, {
    method: 'PUT',
    headers: {
      'Authorization': 'Bearer ' + GITHUB_TOKEN,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.content) {
      window._feedbackSha = data.content.sha;
      existingFeedback = allFeedback;
      showToast('Feedback saved! Your concierge is learning.');
    } else {
      showToast('Error saving - try again');
      console.error(data);
    }
    btn.innerHTML = 'Save Feedback <span class="count">(' + Object.keys(reactions).length + ' rated)</span>';
    btn.disabled = false;
  })
  .catch(function(err) {
    showToast('Network error - try again');
    console.error(err);
    btn.innerHTML = 'Save Feedback <span class="count">(' + Object.keys(reactions).length + ' rated)</span>';
    btn.disabled = false;
  });
}

function showToast(msg) {
  var toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(function() { toast.classList.remove('show'); }, 3000);
}
</script>
