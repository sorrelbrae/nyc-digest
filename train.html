<style>
  :root {
    --bg: #0a0a0a;
    --bg2: #111;
    --bg3: #1a1a1a;
    --border: #2a2a2a;
    --text: #e8e8e0;
    --muted: #666;
    --accent: #c8f560;
    --accent2: #60c8f5;
    --accent3: #f5a060;
    --accent4: #d060f5;
    --green: #60f590;
    --yellow: #f5d060;
    --red: #f56060;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header */
  .site-header {
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(10,10,10,0.96);
    z-index: 100;
    backdrop-filter: blur(12px);
    gap: 16px;
  }
  .header-left { display: flex; flex-direction: column; gap: 2px; }
  .header-eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .header-title { font-size: 18px; font-weight: 600; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .back-link {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    transition: all 0.2s;
  }
  .back-link:hover { color: var(--text); border-color: #444; }

  /* Stats bar */
  .stats-bar {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 14px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    font-size: 13px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .stat-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
  }
  .stat-pill.green { border-color: #3a5a28; background: #0d1a0d; color: var(--green); }
  .stat-pill.yellow { border-color: #5a4a18; background: #1a1a0d; color: var(--yellow); }
  .stat-pill.red { border-color: #5a1a1a; background: #1a0d0d; color: var(--red); }
  .stat-pill.neutral { color: var(--muted); }
  .progress-bar {
    flex: 1;
    min-width: 120px;
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-left: 8px;
  }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.4s ease; }
  .progress-pct { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); margin-left: 6px; }

  /* Filter bar */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .filter-label { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); margin-right: 4px; }
  .filter-btn {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }
  .filter-btn:hover { background: var(--bg3); color: var(--text); }
  .filter-btn.active { background: var(--bg3); color: var(--text); border-color: #555; }
  .filter-btn.active.all { border-color: var(--muted); }
  .filter-btn.active.up { border-color: var(--green); color: var(--green); background: #0d1a0d; }
  .filter-btn.active.maybe { border-color: var(--yellow); color: var(--yellow); background: #1a1a0d; }
  .filter-btn.active.down { border-color: var(--red); color: var(--red); background: #1a0d0d; }
  .filter-btn.active.unrated { border-color: #555; color: var(--text); }

  /* Save button */
  .save-area {
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .save-btn {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 10px 24px;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: #0a0a0a;
    cursor: pointer;
    transition: all 0.2s;
  }
  .save-btn:hover { background: #d8ff70; }
  .save-btn:disabled { background: #333; color: var(--muted); cursor: not-allowed; }
  .save-status {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }
  .save-status.success { color: var(--green); }
  .save-status.error { color: var(--red); }

  /* Event grid */
  .events-grid {
    padding: 24px 32px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
    max-width: 1400px;
  }

  /* Event card */
  .event-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color 0.2s;
    position: relative;
  }
  .event-card:hover { border-color: #3a3a3a; }
  .event-card.rated-up { border-color: #3a5a28; background: #0d160d; }
  .event-card.rated-maybe { border-color: #5a4a18; background: #160d0d; }
  .event-card.rated-down { border-color: #3a1a1a; background: #160d0d; }

  /* Wildcard badge */
  .wildcard-badge {
    position: absolute;
    top: 12px;
    right: 12px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: #f0c040;
    background: #2a2008;
    border: 1px solid #4a3808;
    border-radius: 4px;
    padding: 2px 6px;
    text-transform: uppercase;
  }

  .event-day-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .event-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    text-decoration: none;
    line-height: 1.35;
    display: block;
    padding-right: 60px;
  }
  .event-title:hover { color: var(--accent); }
  .event-meta-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
    flex-wrap: wrap;
  }
  .event-venue-name { color: var(--accent2); font-weight: 500; }
  .event-time-text { font-family: 'Space Mono', monospace; font-size: 11px; }
  .event-price-badge {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    background: #1a2a08;
    color: var(--accent);
    border: 1px solid #2a4018;
    margin-left: auto;
  }
  .event-price-badge.free { background: #082a18; color: var(--green); border-color: #183a28; }

  .event-desc {
    font-size: 13px;
    color: #a8a8a0;
    line-height: 1.55;
  }
  .event-tags-row {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .etag {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.05em;
    padding: 2px 7px;
    border-radius: 3px;
    background: #1a1a1a;
    color: var(--muted);
    border: 1px solid #2a2a2a;
  }
  .etag.primary { background: #1a2a10; color: #90c060; border-color: #2a4a18; }

  /* Vote buttons */
  .vote-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    margin-top: 4px;
  }
  .vote-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 8px 4px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.15s;
  }
  .vote-btn:hover { background: var(--bg3); color: var(--text); }
  .vote-btn.up:hover, .vote-btn.up.active { background: #0d1a0d; border-color: var(--green); color: var(--green); }
  .vote-btn.maybe:hover, .vote-btn.maybe.active { background: #1a1a0d; border-color: var(--yellow); color: var(--yellow); }
  .vote-btn.down:hover, .vote-btn.down.active { background: #1a0d0d; border-color: var(--red); color: var(--red); }

  /* No events message */
  .empty-state {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
  }

  @media (max-width: 640px) {
    .site-header { padding: 16px 20px; }
    .stats-bar, .filter-bar, .save-area { padding: 12px 20px; }
    .events-grid { padding: 16px 20px; grid-template-columns: 1fr; }
  }
</style>

// State
var ratings = {};
var currentFilter = 'all';

// Load any existing ratings from localStorage equivalent (in-memory session)
function initRatings() {
  // Try to load from session variable
  try {
    var stored = window._sessionRatings;
    if (stored) ratings = stored;
  } catch(e) {}
}

function setRating(id, val) {
  ratings[id] = val;
  window._sessionRatings = ratings;
  renderCards();
  updateStats();
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.className = 'filter-btn';
    if (btn.getAttribute('onclick').includes("'"+f+"'")) btn.classList.add('active', f);
  });
  renderCards();
}

function updateStats() {
  var up = 0, maybe = 0, down = 0;
  Object.values(ratings).forEach(function(v) {
    if (v==='up') up++;
    else if (v==='maybe') maybe++;
    else if (v==='down') down++;
  });
  var total = EVENTS.length;
  var rated = up + maybe + down;
  var pct = Math.round(rated / total * 100);

  document.getElementById('stat-total').textContent = total + ' events';
  document.getElementById('stat-up').textContent = '👍 ' + up;
  document.getElementById('stat-maybe').textContent = '🤔 ' + maybe;
  document.getElementById('stat-down').textContent = '👎 ' + down;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '% rated';
}

function renderCards() {
  var grid = document.getElementById('events-grid');
  var filtered = EVENTS.filter(function(ev) {
    if (currentFilter === 'all') return true;
    if (currentFilter === 'unrated') return !ratings[ev.id];
    return ratings[ev.id] === currentFilter;
  });

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state">No events in this filter.</div>';
    return;
  }

  grid.innerHTML = filtered.map(function(ev) {
    var r = ratings[ev.id] || '';
    var cardClass = 'event-card' + (r ? ' rated-' + r : '');
    var isFree = ev.priceCents === 0;
    var priceClass = 'event-price-badge' + (isFree ? ' free' : '');
    var primaryTags = ev.tags.slice(0, 2);
    var restTags = ev.tags.slice(2);

    var tagsHtml = primaryTags.map(function(t) {
      return '<span class="etag primary">' + t + '</span>';
    }).join('') + restTags.map(function(t) {
      return '<span class="etag">' + t + '</span>';
    }).join('');

    var wildcardBadge = ev.isWildcard ? '<div class="wildcard-badge">★ wildcard</div>' : '';

    return '<div class="' + cardClass + '" id="card-' + ev.id + '">' +
      wildcardBadge +
      '<div class="event-day-label">' + ev.dayLabel + '</div>' +
      '<a class="event-title" href="' + ev.url + '" target="_blank">' + ev.title + '</a>' +
      '<div class="event-meta-row">' +
        '<span class="event-venue-name">' + ev.venue + '</span>' +
        '<span>·</span>' +
        '<span class="event-time-text">' + ev.time + '</span>' +
        '<span class="' + priceClass + '">' + ev.price + '</span>' +
      '</div>' +
      '<div class="event-desc">' + ev.description + '</div>' +
      '<div class="event-tags-row">' + tagsHtml + '</div>' +
      '<div class="vote-row">' +
        '<button class="vote-btn up' + (r==='up'?' active':'') + '" onclick="setRating(\'' + ev.id + '\',\'up\')">👍 Interested</button>' +
        '<button class="vote-btn maybe' + (r==='maybe'?' active':'') + '" onclick="setRating(\'' + ev.id + '\',\'maybe\')">🤔 Maybe</button>' +
        '<button class="vote-btn down' + (r==='down'?' active':'') + '" onclick="setRating(\'' + ev.id + '\',\'down\')">👎 Not for me</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

async function saveFeedback() {
  var btn = document.querySelector('.save-btn');
  var status = document.getElementById('save-status');

  var entries = Object.entries(ratings);
  if (entries.length === 0) {
    status.textContent = 'Rate at least one event first!';
    status.className = 'save-status error';
    return;
  }

  btn.disabled = true;
  status.className = 'save-status';
  status.textContent = 'Saving to GitHub…';

  // Build new feedback entries
  var today = new Date().toISOString().slice(0, 10);
  var newEntries = entries.map(function(pair) {
    var id = pair[0];
    var reaction = pair[1];
    var ev = EVENTS.find(function(e) { return e.id === id; });
    return {
      date: today,
      eventId: id,
      eventTitle: ev ? ev.title : id,
      eventVenue: ev ? ev.venue : '',
      eventDate: ev ? ev.date : '',
      reaction: reaction,
      tags: ev ? ev.tags : [],
      source: ev ? ev.source : 'web',
      isWildcard: ev ? ev.isWildcard : false,
      priceCents: ev ? ev.priceCents : 0
    };
  });

  try {
    var headers = {
      'Authorization': 'token ' + GITHUB_TOKEN,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    };

    // GET current feedback.json
    var getResp = await fetch('https://api.github.com/repos/' + GITHUB_REPO + '/contents/feedback.json', { headers: headers });
    var existing = [];
    var sha = null;
    if (getResp.ok) {
      var getData = await getResp.json();
      sha = getData.sha;
      existing = JSON.parse(atob(getData.content.replace(/\n/g, '')));
    }

    // Remove any existing ratings for these event IDs (replace with new)
    var newIds = newEntries.map(function(e) { return e.eventId; });
    existing = existing.filter(function(e) { return !newIds.includes(e.eventId); });
    var merged = existing.concat(newEntries);

    var content = btoa(unescape(encodeURIComponent(JSON.stringify(merged, null, 2))));
    var body = { message: 'Update feedback.json — ' + today, content: content };
    if (sha) body.sha = sha;

    var putResp = await fetch('https://api.github.com/repos/' + GITHUB_REPO + '/contents/feedback.json', {
      method: 'PUT',
      headers: headers,
      body: JSON.stringify(body)
    });

    if (putResp.ok) {
      status.textContent = '✓ Saved ' + entries.length + ' ratings to GitHub!';
      status.className = 'save-status success';
    } else {
      var err = await putResp.json();
      status.textContent = 'Error: ' + (err.message || putResp.status);
      status.className = 'save-status error';
    }
  } catch(e) {
    status.textContent = 'Error: ' + e.message;
    status.className = 'save-status error';
  }

  btn.disabled = false;
}

// Init
initRatings();
renderCards();
updateStats();
</script>
