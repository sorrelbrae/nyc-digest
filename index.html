<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC Cultural Concierge — Apr 6–12, 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --surface: #161922;
  --surface2: #1e2230;
  --accent: #7b6ff0;
  --accent2: #f06f9b;
  --text: #e4e4ec;
  --text-dim: #8b8da0;
  --text-bright: #ffffff;
  --border: #2a2d3e;
  --tag-bg: #252840;
  --free: #4ade80;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  line-height: 1.6;
  padding: 0;
}
.container { max-width: 700px; margin: 0 auto; padding: 24px 20px; }
header {
  text-align: center;
  padding: 48px 20px 32px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 32px;
}
header h1 {
  font-family: 'Space Mono', monospace;
  font-size: 1.6rem;
  color: var(--text-bright);
  letter-spacing: -0.5px;
  margin-bottom: 8px;
}
header .subtitle {
  color: var(--text-dim);
  font-size: 0.95rem;
}
header .date-range {
  display: inline-block;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-weight: 600;
  font-size: 1.1rem;
  margin-top: 8px;
}
.training-banner {
  background: var(--surface2);
  border: 1px solid var(--accent);
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 36px;
  text-align: center;
}
.training-banner a {
  color: var(--accent);
  text-decoration: none;
  font-weight: 600;
}
.training-banner a:hover { text-decoration: underline; }
.training-banner .emoji { font-size: 1.2rem; }
.day-section { margin-bottom: 36px; }
.day-header {
  font-family: 'Space Mono', monospace;
  font-size: 1.1rem;
  color: var(--accent);
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.event-card {
  background: var(--surface);
  border-radius: 12px;
  padding: 18px 20px;
  margin-bottom: 12px;
  border: 1px solid var(--border);
  transition: border-color 0.2s;
}
.event-card:hover { border-color: var(--accent); }
.event-title {
  font-size: 1.05rem;
  font-weight: 600;
  margin-bottom: 6px;
}
.event-title a {
  color: var(--text-bright);
  text-decoration: none;
}
.event-title a:hover { color: var(--accent); }
.event-meta {
  font-family: 'Space Mono', monospace;
  font-size: 0.78rem;
  color: var(--text-dim);
  margin-bottom: 8px;
}
.event-meta .venue { color: var(--accent2); }
